version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai_grubchat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: grubchat
      POSTGRES_PASSWORD: grubchat_secret
      POSTGRES_DB: ai_grubchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grubchat -d ai_grubchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ai_grubchat_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://grubchat:grubchat_secret@postgres:5432/ai_grubchat
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Socket.io Server
  socket:
    build:
      context: .
      dockerfile: apps/socket-server/Dockerfile
    container_name: ai_grubchat_socket
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      WEB_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://grubchat:grubchat_secret@postgres:5432/ai_grubchat
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
